# This workflow runs every time you push code or open a Pull Request
name: CI Pipeline

on:
  push:
    branches: [ "main" ]   # runs on push to main
  pull_request:
    branches: [ "main" ]   # runs on PRs targeting main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest   # GitHub spins up a fresh Ubuntu VM for this

    steps:
      # 1. Check out your code into the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the tests
      - name: Run tests
        run: pytest tests/ -v
